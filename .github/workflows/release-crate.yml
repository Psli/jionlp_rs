name: Publish jionlp-core to crates.io

# Triggered by a tag matching `jionlp-core-v*` (e.g. `jionlp-core-v0.1.0`).
# Publishes the Rust crate with its bundled `data/` (9 MB of dict files).
#
# Requires repository secret `CARGO_REGISTRY_TOKEN` — create at
# https://crates.io/settings/tokens and add under
# Settings → Secrets and variables → Actions.

on:
  push:
    tags:
      - 'jionlp-core-v*'

jobs:
  publish:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache target
        uses: Swatinem/rust-cache@v2

      - name: Verify version matches tag
        run: |
          TAG_VER="${GITHUB_REF_NAME#jionlp-core-v}"
          CRATE_VER=$(grep -E '^version' crates/jionlp-core/Cargo.toml \
            | head -1 | sed -E 's/.*"(.*)"/\1/')
          if [[ "$TAG_VER" != "$CRATE_VER" ]]; then
            echo "Tag $TAG_VER does not match Cargo.toml version $CRATE_VER" >&2
            exit 1
          fi

      - name: Publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p jionlp-core --no-verify
